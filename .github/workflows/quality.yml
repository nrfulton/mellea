name: Verify Code Quality

on:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

env:
  CICD: 1
  OLLAMA_HOST: "127.0.0.1:5000"

jobs:
  actionlint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Lint GitHub Actions workflows
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2.1.2

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Free disk space
        uses: ./.github/actions/free-disk-space
      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: pre-commit cache key
        run: echo "PY=$(python -VV | sha256sum | cut -d' ' -f1)" >> "$GITHUB_ENV"
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit|${{ env.PY }}|${{ hashFiles('.pre-commit-config.yaml', 'uv.lock') }}
      - name: Install dependencies
        run: uv sync --frozen --all-extras --group dev
      - name: Check style and run tests
        id: precommit
        run: uv run pre-commit run --all-files
      - name: Send failure message pre-commit
        if: failure() # This step will only run if a previous step failed
        run: echo "The quality verification failed. Please run precommit "
      - name: Download NLTK data
        run: uv run python -m nltk.downloader punkt_tab
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh
      - name: Start serving ollama
        run: nohup ollama serve &
      - name: Pull models
        run: |
          ollama pull granite4.1:3b
      - name: Run Tests
        id: tests
        run: uv run -m pytest -v --junit-xml=/tmp/pytest-results.xml test
      - name: Send failure message tests
        if: failure() # This step will only run if a previous step failed
        run: echo "Tests failed. Please verify that tests are working locally."
      - name: Write job summary
        if: always()
        run: |
          python3 - <<'PYEOF'
          import os, xml.etree.ElementTree as ET

          python_version = os.environ.get("PYTHON_VERSION", "")
          precommit_outcome = os.environ.get("STEPS_PRECOMMIT_OUTCOME", "")
          test_outcome = os.environ.get("STEPS_TESTS_OUTCOME", "")

          def icon(outcome):
              return "✅" if outcome == "success" else ("❌" if outcome == "failure" else "⏭️")

          lines = [
              f"## Code Quality — Python {python_version}\n",
              "| Check | Result |",
              "|-------|--------|",
              f"| Pre-commit (ruff, mypy, uv-lock, codespell, markdownlint) | {icon(precommit_outcome)} {precommit_outcome} |",
              f"| Tests | {icon(test_outcome)} {test_outcome} |",
              "",
          ]

          try:
              tree = ET.parse("/tmp/pytest-results.xml")
              root = tree.getroot()
              # JUnit XML may be a <testsuites> wrapper or a bare <testsuite>
              suite = root if root.tag == "testsuite" else root.find("testsuite") or root
              attrs = suite.attrib
              total = int(attrs.get("tests", 0))
              failures = int(attrs.get("failures", 0))
              errors = int(attrs.get("errors", 0))
              skipped = int(attrs.get("skipped", 0))
              passed = total - failures - errors - skipped
              lines.append(
                  f"**Tests:** {passed} passed, {failures} failed, {errors} errors, "
                  f"{skipped} skipped ({total} total)\n"
              )
              if failures + errors > 0:
                  lines.append("**Failed tests:**\n")
                  for tc in root.iter("testcase"):
                      fail = tc.find("failure") or tc.find("error")
                      if fail is not None:
                          name = f"{tc.get('classname', '')}.{tc.get('name', '')}"
                          lines.append(f"- `{name}`")
                  lines.append("")
          except Exception:
              pass  # pytest didn't run or XML unavailable

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write("\n".join(lines))
          PYEOF
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
          STEPS_PRECOMMIT_OUTCOME: ${{ steps.precommit.outcome }}
          STEPS_TESTS_OUTCOME: ${{ steps.tests.outcome }}
